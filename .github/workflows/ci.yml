name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.23.1
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install host dependencies
        run: sudo apt-get update && sudo apt-get install -y ca-certificates curl tar gzip coreutils tmux git python3 make g++
      - run: npm ci
      - run: npm run check
      - name: Test
        run: |
          test_tmp=$(mktemp -d /var/tmp/desk-vitest.XXXXXX)
          trap 'rm -rf "$test_tmp"' EXIT
          TMPDIR="$test_tmp" npm test
      - run: npm run build:distribution
      - run: npm run smoke:serve-modes
      - name: Restore and verify the Node CLI after runtime smoke
        run: npm run build
