name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
  pull_request:
    paths:
      - 'install.sh'
      - 'scripts/create-release-assets.mjs'
      - 'scripts/distribution/**'
      - 'scripts/build-standalone.ts'
      - 'scripts/smoke-serve-modes.mjs'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/release.yml'

permissions:
  contents: read

jobs:
  assets-and-install:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.23.1
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y ca-certificates curl tar gzip coreutils tmux git python3 make g++
      - run: npm ci
      - name: Resolve and verify release version
        id: version
        shell: bash
        run: |
          package_version="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [[ "$GITHUB_REF_NAME" != "$package_version" ]]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json $package_version"
            exit 1
          fi
          echo "value=$package_version" >> "$GITHUB_OUTPUT"
      - name: Generate source-backed release assets
        run: npm run release:assets -- --version "${{ steps.version.outputs.value }}" --out-dir "$RUNNER_TEMP/release-assets"
      - name: Verify release checksums
        run: (cd "$RUNNER_TEMP/release-assets" && sha256sum -c SHA256SUMS)
      - name: Install and smoke the published contract
        shell: bash
        run: |
          root=$(mktemp -d "$RUNNER_TEMP/desk-release-install.XXXXXX")
          trap 'rm -rf "$root"' EXIT
          mkdir -p "$root/bin" "$root/home" "$root/user-home" "$root/outside"
          export HOME="$root/user-home"
          export PATH="$root/bin:$PATH"
          export DESK_HOME="$root/home"
          export DESK_BIN_DIR="$root/bin"
          export DESK_VERSION="${{ steps.version.outputs.value }}"
          export DESK_RELEASE_BASE_URL="file://$RUNNER_TEMP/release-assets"
          bash install.sh
          (cd "$root/outside" && "$root/bin/desk" help)
          node scripts/smoke-serve-modes.mjs --desk "$root/bin/desk" --cwd "$root/outside"
          bash install.sh --uninstall
          test ! -e "$root/bin/desk"
          test ! -e "$root/home"
      - uses: actions/upload-artifact@v4
        with:
          name: desk-release-assets
          path: |
            ${{ runner.temp }}/release-assets/desk-${{ steps.version.outputs.value }}-source.tar.gz
            ${{ runner.temp }}/release-assets/desk-install-manifest.json
            ${{ runner.temp }}/release-assets/SHA256SUMS
          if-no-files-found: error

  publish:
    needs: assets-and-install
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desk-release-assets
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Desk ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/desk-${{ needs.assets-and-install.outputs.version }}-source.tar.gz
            release-assets/desk-install-manifest.json
            release-assets/SHA256SUMS
