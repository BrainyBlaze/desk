name: release

# Build the standalone Bun binary for each platform and publish it to a GitHub
# Release. Triggered by pushing a package version tag; the tag must match
# package.json "version". `workflow_dispatch` builds the matrix without releasing
# (artifacts only) so the build can be exercised on demand.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
  # Smoke-build the matrix on PRs that touch the build inputs (no release — the
  # release job is gated to tags). Keeps the release build from breaking unnoticed.
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/build-standalone.ts'
      - 'scripts/make-assets.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: linux-x64 }
          - { os: ubuntu-24.04-arm, target: linux-arm64 }
          - { os: macos-14, target: darwin-arm64 }
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-pty builds its native addon from source on Linux (python3 + a
      # toolchain are preinstalled on the runners); macOS uses shipped prebuilds.
      - run: npm ci

      # vite build (UI) -> make-assets (tar UI + LSP) -> bun build --compile.
      # The UI bundle can overflow node's ~2 GB default heap.
      - name: Build standalone binary
        run: npm run build:standalone
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Stage artifact
        run: |
          mkdir -p out
          mv desk-server "out/desk-server-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: desk-server-${{ matrix.target }}
          path: out/desk-server-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          echo "package.json=$pkg  tag=$GITHUB_REF_NAME"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json $pkg"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist-bins
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist-bins
          ls -la
          sha256sum desk-server-* > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Desk ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist-bins/desk-server-*
            dist-bins/SHA256SUMS
