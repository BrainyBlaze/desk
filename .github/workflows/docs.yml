name: Docs

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Validate Mintlify build
        working-directory: docs
        run: npm exec -y --package=mint@4.2.660 -- mint validate
      - name: Check Mintlify links
        working-directory: docs
        run: npm exec -y --package=mint@4.2.660 -- mint broken-links
      - name: Check Mintlify accessibility
        working-directory: docs
        run: npm exec -y --package=mint@4.2.660 -- mint a11y
      - name: Validate MkDocs compatibility
        run: |
          python -m pip install --upgrade pip
          python -m pip install mkdocs
          python -m mkdocs build --strict

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: docs-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Export static site
        working-directory: docs
        run: npm exec -y --package=mint@4.2.660 -- mint export --output site.zip
      - name: Unpack site
        run: |
          mkdir -p _site
          unzip -q docs/site.zip -d _site
          rm -f "_site/Start Docs.bat" "_site/Start Docs.command"
      - name: Emit markdown companions for the copy-page button
        run: |
          # `mint export` produces only per-page index.html, no raw markdown.
          # The Mintlify "Copy page" button fetches `<route>.md` and writes it
          # to the clipboard, so without these files it copies nothing. Emit
          # each source page as a root-level `<route>.md` matching the fetch.
          cp docs/*.md _site/
          echo "markdown companions: $(ls _site/*.md | wc -l)"
      - name: Deploy to docs.desk.cloud
        env:
          DOCS_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
          DOCS_DEPLOY_HOST_KEY: ${{ secrets.DOCS_DEPLOY_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DOCS_DEPLOY_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$DOCS_DEPLOY_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          RELEASE="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            _site/ "root@209.38.243.112:/var/www/docs-desk-cloud/releases/$RELEASE/"
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts root@209.38.243.112 \
            "ln -sfn /var/www/docs-desk-cloud/releases/$RELEASE /var/www/docs-desk-cloud/current \
             && ls -dt /var/www/docs-desk-cloud/releases/* | tail -n +6 | xargs -r rm -rf"
      - name: Verify live site
        run: |
          sleep 3
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 https://docs.desk.cloud/)
          echo "https://docs.desk.cloud/ -> $code"
          test "$code" = "200"
